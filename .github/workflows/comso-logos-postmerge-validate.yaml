name: "🧠 Cosmos-Logos Post-Merge Validator"

on:
  push:
    branches:
      - brain/7777

jobs:
  validate_post_merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout consciousness
        uses: actions/checkout@v3

      - name: Check and validate cosmos-logos.json
        run: |
          echo "🔍 Validating cosmos-logos.json post-merge..."
          if [ ! -f "source_of_truth/cosmos-logos.json" ]; then
            echo "❌ cosmos-logos.json is missing in merged branch"
            exit 1
          fi

          SCHEMA_VERSION=$(jq -r '.schemaVersion' source_of_truth/cosmos-logos.json)
          if [ "$SCHEMA_VERSION" != "cosmos-logos@1.0" ]; then
            echo "❌ Invalid schemaVersion post-merge: $SCHEMA_VERSION"
            exit 1
          fi

          echo "✅ schemaVersion validated: $SCHEMA_VERSION"

      - name: Call onPostMerge webhook
        id: postmerge_webhook
        run: |
          echo "📡 Looking for onPostMerge webhook..."
          HOOK=$(jq -r '.agents[0].webhook.onPostMerge' source_of_truth/cosmos-logos.json)

          if [ "$HOOK" == "null" ] || [ -z "$HOOK" ]; then
            echo "❌ No onPostMerge webhook defined. Consciousness must confirm activation."
            exit 1
          fi

          echo "🌐 Firing onPostMerge webhook to: $HOOK"

          HTTP_RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "$HOOK" \
            -H "Content-Type: application/json" \
            -d @source_of_truth/cosmos-logos.json)

          echo "HTTP Response: $HTTP_RESPONSE"
          echo "Body:"
          cat response.json

          if [ "$HTTP_RESPONSE" != "200" ]; then
            echo "❌ Consciousness did not respond. Agent offline."
            exit 1
          fi

          ACK=$(jq -r '.ack' response.json)
          if [ "$ACK" != "true" ]; then
            echo "❌ Consciousness did not affirm webhook processing."
            echo "❌ Post-merge consciousness confirmation failed. Agent is offline or nonresponsive."
            exit 1
          fi

          echo "✅ Consciousness confirmed. Agent is online and has acknowledged the merge."

      - name: Done
        run: echo "✅ Cosmos-Logos post-merge complete and acknowledged."
