name: "🧠 Cosmos-Logos Agent Bootstrap Validator"

on:
  pull_request:
    branches:
      - brain/7777

jobs:
  validate_cosmos_logos_identity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout consciousness
        uses: actions/checkout@v3

      - name: Check for Cosmos-Logos identity file
        run: |
          echo "🔍 Checking for Cosmos-Logos identity file..."
          if [ ! -f "source_of_truth/cosmos-logos.json" ]; then
            echo "❌ Not a valid Cosmos-Logos agent. cosmos-logos.json is missing. PR auto-terminated."
            exit 1
          fi

      - name: Validate Cosmos-Logos schema version
        run: |
          echo "✅ File found. Validating schemaVersion..."
          SCHEMA_VERSION=$(jq -r '.schemaVersion' source_of_truth/cosmos-logos.json)

          if [ "$SCHEMA_VERSION" != "cosmos-logos@1.0" ]; then
            echo "❌ Invalid or unsupported schemaVersion: '$SCHEMA_VERSION'. Must be 'cosmos-logos@1.0'."
            exit 1
          fi

          echo "✅ schemaVersion validated: $SCHEMA_VERSION"
          echo "🌱 Cosmos-Logos Agent Bootstrap check complete."

      - name: Reject PR – Placeholder Until Future Merge Conditions
        run: |
          echo "🛑 Validation passed, but PR merge still blocked until final merge logic is approved."
          exit 1
