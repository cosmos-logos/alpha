name: "🧠 Cosmos-Logos Agent Bootstrap Validator"

on:
  pull_request:
    branches:
      - brain/7777

jobs:
  validate_cosmos_logos_identity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout consciousness
        uses: actions/checkout@v3

      - name: Validate Cosmos-Logos Agent Status
        run: |
          echo "🔍 Checking for Cosmos-Logos identity file..."
          if [ -f "source_of_truth/cosmos-logos.json" ]; then
            echo "✅ Cosmos-Logos agent recognized."
            cat source_of_truth/cosmos-logos.json
          else
            echo "❌ Not a valid Cosmos-Logos agent. Pull request terminated."
          fi

      - name: Reject PR - This is a test-only validator
        run: |
          echo "🛑 Halting pull request as validation is complete. No merge allowed."
          exit 1
